<template> 
    <div if:true={test}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container">
                <header class="slds-modal__header slds-modal__header_empty">
                    <lightning-button-icon icon-name="utility:close" class="slds-modal__close" onclick={closeModel} variant="bare-inverse"  size="large" ></lightning-button-icon>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-flow flow-api-name="SCH_ServiceAppointmentCancel" flow-input-variables={inputFlowVariables} onstatuschange={handleStatusChange}></lightning-flow>
                </div>
            </div>
           
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </div>
</template>
