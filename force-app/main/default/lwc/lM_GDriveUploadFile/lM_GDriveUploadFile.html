<template>
    <lightning-card title="Enviar Ficheiro" icon-name="custom:custom14">
        <div class="slds-m-around_medium">
            <lightning-input type="file" accept=".pdf" label="Enviar ficheiro"
                onchange={openfileUpload}></lightning-input>

                <template if:true={fileData}>
                    <p class="slds-text-heading_small">{fileData.filename} carregado.</p>
                </template>
        </div>
        
        <lightning-button variant="brand" label="Enviar" title="Enviar" onclick={handleClick}
            class="slds-m-left_x-small"></lightning-button>
    </lightning-card>
</template>
